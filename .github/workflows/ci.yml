name: ci
# PR / push 時に ruff（lint）と pytest（単体テスト）を回す最小CI。
# HO-83 #18 で「本番バグが全部手動検知だった＝プロセスの穴」と挙げた宿題への対応。
# DB不要（テストは純粋ロジック＋fake DBセッション）。auto-merge-deploy の green ゲートにもなる。
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Poetry
        run: pipx install poetry
      - name: Install dependencies
        run: poetry install --no-interaction --no-root
      - name: Ruff (lint)
        run: poetry run ruff check app tests
      - name: Pytest
        run: poetry run pytest -q
