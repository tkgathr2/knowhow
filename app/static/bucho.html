<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ノウハウキング君 — 部長別の成長</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  body { font-family: 'Inter', sans-serif; }
  .fade-in { animation: fadeIn 0.3s ease-in; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

<nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
  <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white text-base">👥</div>
      <h1 class="text-lg font-bold text-gray-900">部長別の成長</h1>
      <span class="text-xs text-gray-400 hidden sm:inline">ノウハウキング君</span>
    </div>
    <div class="flex items-center gap-2">
      <a href="/growth" class="text-sm px-3 py-1.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 rounded-lg transition">グラフ</a>
      <a href="/daily" class="text-sm px-3 py-1.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 rounded-lg transition">毎日ログ</a>
      <a href="/" class="text-sm px-3 py-1.5 bg-gray-100 hover:bg-gray-200 rounded-lg transition">一覧</a>
      <span id="auth-box" class="hidden items-center gap-2 text-xs text-gray-500">
        <span id="auth-user"></span>
        <a href="/auth/logout" class="px-2 py-1 bg-gray-100 hover:bg-gray-200 rounded-lg">ログアウト</a>
      </span>
    </div>
  </div>
</nav>

<div class="max-w-5xl mx-auto px-4 py-6 space-y-5">
  <div id="narrative" class="bg-indigo-50 border border-indigo-100 rounded-xl px-5 py-4 text-indigo-900 text-sm fade-in">読み込み中...</div>
  <div class="flex items-center gap-2">
    <span class="text-xs text-gray-400 mr-1">期間</span>
    <span id="d-7" class="seg text-xs px-3 py-1.5 rounded-lg cursor-pointer bg-gray-100 text-gray-500" onclick="setDays(7)">7日</span>
    <span id="d-30" class="seg text-xs px-3 py-1.5 rounded-lg cursor-pointer bg-indigo-600 text-white" onclick="setDays(30)">30日</span>
    <span id="d-90" class="seg text-xs px-3 py-1.5 rounded-lg cursor-pointer bg-gray-100 text-gray-500" onclick="setDays(90)">90日</span>
  </div>
  <div id="cards" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
</div>

<footer class="mt-12 py-4 text-center text-xs text-gray-400 border-t border-gray-100">ノウハウキング君 — 部長別の成長</footer>

<script>
const API = window.location.origin;
let days = 30;

function esc(s){const d=document.createElement('div');d.textContent=s==null?'':s;return d.innerHTML;}
function fmt(n){return n==null?'-':Number(n).toLocaleString('ja-JP');}
async function api(p){try{const r=await fetch(API+p);if(!r.ok)return null;return await r.json();}catch{return null;}}

function setDays(n){
  days=n;
  [7,30,90].forEach(k=>{
    const el=document.getElementById('d-'+k);
    el.className='seg text-xs px-3 py-1.5 rounded-lg cursor-pointer '+(k===n?'bg-indigo-600 text-white':'bg-gray-100 text-gray-500');
  });
  load();
}

function card(b,maxAdded){
  const bar=Math.round(b.added/Math.max(1,maxAdded)*100);
  const g=b.growth_pct;
  const trend=g==null?'<span class="text-xs text-gray-400">前の期間のデータなし（新規）</span>'
    :(g>=0?`<span class="text-emerald-600 text-xs font-semibold">↑ 前の${days}日より +${g}%</span>`
          :`<span class="text-red-500 text-xs font-semibold">↓ 前の${days}日より ${g}%</span>`);
  return `<a href="/bucho/${esc(b.key)}" class="block bg-white border border-gray-200 rounded-2xl p-5 hover:shadow-md hover:border-indigo-300 transition fade-in">
    <div class="flex items-center gap-3 mb-2">
      <span class="text-4xl">${b.emoji}</span>
      <div class="min-w-0">
        <div class="font-bold text-lg text-gray-900">${esc(b.name)}</div>
        <div class="text-xs text-gray-400">${esc(b.title)}・${esc(b.domain)}</div>
      </div>
      <span class="ml-auto text-gray-300 text-xl">›</span>
    </div>
    <div class="flex items-baseline gap-2">
      <span class="text-4xl font-bold" style="color:${b.color}">+${fmt(b.added)}</span>
      <span class="text-sm text-gray-500">件の知恵（この${days}日）</span>
    </div>
    <div class="h-2 bg-gray-100 rounded mt-2 overflow-hidden"><span style="display:block;height:100%;width:${bar}%;background:${b.color};border-radius:4px;"></span></div>
    <div class="flex justify-between mt-2 text-sm text-gray-500">
      <span>これまでの知恵 <b class="text-gray-700">${fmt(b.total)}</b>件</span>
      <span title="この部長の知恵がAIに使われた回数">活躍 <b class="text-gray-700">${fmt(b.recalls)}</b>回</span>
    </div>
    <div class="mt-1.5">${trend}</div>
  </a>`;
}

async function loadAuth(){
  const d=await api('/auth/me');
  if(d&&d.oauth_enabled&&d.user){
    document.getElementById('auth-user').textContent=d.user;
    const b=document.getElementById('auth-box');b.classList.remove('hidden');b.classList.add('flex');
  }
}

async function load(){
  loadAuth();
  const d=await api('/api/stats/bucho?days='+days);
  const cards=document.getElementById('cards');
  if(!d||!d.buchos){cards.innerHTML='<p class="text-sm text-gray-400">読み込みに失敗しました</p>';return;}
  const total=d.buchos.reduce((s,b)=>s+b.added,0);
  const top=[...d.buchos].sort((a,b)=>b.added-a.added)[0];
  document.getElementById('narrative').textContent=
    `この${days}日で、会社の知恵は全部で ${fmt(total)}件 増えました。いちばん伸びたのは ${top.emoji} ${top.name}（+${fmt(top.added)}件）。カードを押すと、その部長の詳しいページが開きます。`;
  const maxAdded=Math.max(...d.buchos.map(b=>b.added),1);
  cards.innerHTML=d.buchos.map(b=>card(b,maxAdded)).join('');
}

load();
</script>
<script src="/static/nav.js"></script>
</body>
</html>
