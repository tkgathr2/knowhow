<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ノウハウキング君 — 日報</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  body { font-family: 'Inter', sans-serif; }
  .fade-in { animation: fadeIn 0.3s ease-in; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .tab { padding: 6px 16px; font-size: 0.85rem; font-weight: 600; border-radius: 8px; cursor: pointer; transition: all 0.15s; background: #f3f4f6; color: #6b7280; }
  .tab.active { background: #4f46e5; color: white; }
  .tab:not(.active):hover { background: #e5e7eb; }
  .md h1{font-size:1.25rem;font-weight:700;margin:.8em 0 .4em;}
  .md h2{font-size:1.1rem;font-weight:700;margin:.8em 0 .4em;}
  .md h3{font-size:1rem;font-weight:600;margin:.7em 0 .3em;}
  .md p{margin:.5em 0;line-height:1.7;}
  .md ul{list-style:disc;padding-left:1.4em;margin:.5em 0;}
  .md ol{list-style:decimal;padding-left:1.4em;margin:.5em 0;}
  .md li{margin:.2em 0;}
  .md table{border-collapse:collapse;margin:.6em 0;font-size:.85rem;}
  .md th,.md td{border:1px solid #e5e7eb;padding:4px 8px;}
  .md th{background:#f9fafb;}
  .md code{background:#f3f4f6;padding:1px 5px;border-radius:4px;font-size:.85em;}
  .md blockquote{border-left:3px solid #c7d2fe;padding-left:.8em;color:#4b5563;margin:.5em 0;}
</style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

<nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
  <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      </div>
      <h1 class="text-lg font-bold text-gray-900">日報</h1>
      <span class="text-xs text-gray-400 hidden sm:inline">ノウハウキング君</span>
    </div>
    <div class="flex items-center gap-2">
      <span id="auth-box" class="hidden items-center gap-2 text-xs text-gray-500">
        <span id="auth-user"></span>
        <a href="/auth/logout" class="px-2 py-1 bg-gray-100 hover:bg-gray-200 rounded-lg">ログアウト</a>
      </span>
      <button onclick="load()" class="text-sm px-3 py-1.5 bg-gray-100 hover:bg-gray-200 rounded-lg transition">更新</button>
    </div>
  </div>
</nav>

<div class="max-w-6xl mx-auto px-4 py-6 space-y-5">

  <!-- 部署タブ -->
  <div class="flex flex-wrap items-center gap-2">
    <span id="t-stepup" class="tab active" onclick="setDept('stepup')">ステップアップ</span>
    <span id="t-soumu" class="tab" onclick="setDept('soumu')">総務</span>
    <span id="t-koutsu" class="tab" onclick="setDept('koutsu')">交通誘導</span>
  </div>

  <div class="flex flex-col lg:flex-row gap-5">
    <!-- 左：日付リスト -->
    <div class="lg:w-1/4">
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="px-4 py-3 border-b border-gray-100">
          <h2 class="font-semibold text-sm text-gray-700">日付</h2>
        </div>
        <div id="date-list" class="divide-y divide-gray-50 max-h-[70vh] overflow-y-auto"></div>
      </div>
    </div>

    <!-- 右：本文 -->
    <div class="lg:w-3/4">
      <div id="detail" class="bg-white rounded-xl shadow-sm border border-gray-200 p-5 fade-in min-h-[300px]">
        <p class="text-sm text-gray-400">読み込み中…</p>
      </div>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;
let dept = 'stepup';
let reports = [];
let selectedId = null;

function esc(s){const d=document.createElement('div');d.textContent=s==null?'':s;return d.innerHTML;}
function renderMd(md){
  if(!md) return '';
  try { return marked.parse(md); } catch { return '<p>'+esc(md)+'</p>'; }
}

async function api(path){try{const r=await fetch(API+path);if(!r.ok)return null;return await r.json();}catch{return null;}}

function setDept(d){
  dept=d;
  ['stepup','soumu','koutsu'].forEach(k=>document.getElementById('t-'+k).classList.toggle('active',k===d));
  selectedId=null;
  load();
}

async function loadAuth(){
  const d=await api('/auth/me');
  if(d&&d.oauth_enabled&&d.user){
    document.getElementById('auth-user').textContent=d.user;
    document.getElementById('auth-box').classList.remove('hidden');
    document.getElementById('auth-box').classList.add('flex');
  }
}

function renderDateList(){
  const box=document.getElementById('date-list');
  if(!reports.length){box.innerHTML='<p class="p-4 text-xs text-gray-400">日報がありません</p>';return;}
  box.innerHTML=reports.map(r=>{
    const active=r.id===selectedId;
    return `<button onclick="selectReport(${r.id})" class="w-full text-left px-4 py-3 transition ${active?'bg-indigo-50':'hover:bg-gray-50'}">
      <div class="text-sm font-semibold ${active?'text-indigo-700':'text-gray-800'}">${esc(r.report_date)}</div>
      <div class="text-xs text-gray-500 truncate">${esc(r.title||'(無題)')}</div>
    </button>`;
  }).join('');
}

const METRIC_LABELS={
  sales_month:'月間売上', target_month:'月間目標', achv_pct:'達成率',
  naitei_today:'本日の内定', naitei_month:'今月の内定', week_total:'先週の合計売上',
  week_pct:'先週時点の進捗', funnel:'採用ファネル', sales_today:'本日の売上'
};
const FUNNEL_ORDER=['登録','面談','紹介','面接','内定'];
function fmtYen(n){ return '¥'+Number(n).toLocaleString('ja-JP'); }
function fmtFunnel(f){
  const keys=FUNNEL_ORDER.filter(k=>k in f).concat(Object.keys(f).filter(k=>!FUNNEL_ORDER.includes(k)));
  return keys.map(k=>`${k} ${f[k]}`).join('　→　');
}
function kpiCards(metrics){
  if(!metrics||typeof metrics!=='object'||!Object.keys(metrics).length) return '';
  const cards=Object.entries(metrics).map(([k,v])=>{
    const label=METRIC_LABELS[k]||k;
    const wide=(k==='funnel');
    let val=v;
    if(k==='funnel'&&v&&typeof v==='object') val=fmtFunnel(v);
    else if(v&&typeof v==='object') val=Object.entries(v).map(([kk,vv])=>`${kk} ${vv}`).join('　/　');
    else if(typeof v==='number'&&/(sales|total|target|amount|kingaku)/.test(k)) val=fmtYen(v);
    else if(typeof v==='number'&&/(pct|rate|ritsu)/.test(k)) val=v+'%';
    return `<div class="bg-indigo-50 border border-indigo-100 rounded-lg px-3 py-2 ${wide?'col-span-2 sm:col-span-4':''}">
      <div class="text-[11px] text-indigo-500">${esc(label)}</div>
      <div class="text-base font-bold text-indigo-900 break-all">${esc(String(val))}</div>
    </div>`;
  }).join('');
  return `<div class="grid grid-cols-2 sm:grid-cols-4 gap-2 mb-4">${cards}</div>`;
}

function renderDetail(){
  const box=document.getElementById('detail');
  const r=reports.find(x=>x.id===selectedId);
  if(!r){box.innerHTML='<p class="text-sm text-gray-400">日報を選んでください</p>';return;}
  box.innerHTML=`
    <div class="flex items-baseline gap-2 flex-wrap mb-1">
      <h2 class="text-xl font-bold text-gray-900">${esc(r.title||'(無題)')}</h2>
      <span class="text-sm text-gray-400">${esc(r.report_date)}</span>
    </div>
    ${r.bucho?`<div class="text-sm font-semibold text-indigo-700 mt-1">${esc(r.bucho)}</div>`:''}
    ${r.bucho_comment?`<div class="bg-indigo-50 border border-indigo-100 rounded-lg px-4 py-3 text-sm text-indigo-900 my-3">${esc(r.bucho_comment)}</div>`:''}
    ${r.summary?`<div class="border-l-4 border-gray-200 pl-3 text-sm text-gray-700 whitespace-pre-line my-3">${esc(r.summary)}</div>`:''}
    ${kpiCards(r.metrics)}
    <hr class="my-4 border-gray-100">
    <div class="md text-sm text-gray-800">${renderMd(r.body_md)}</div>
  `;
}

function selectReport(id){selectedId=id;renderDateList();renderDetail();}

function initDeptFromUrl(){
  const q=new URLSearchParams(window.location.search).get('dept');
  if(q && ['stepup','soumu','koutsu'].includes(q)){
    dept=q;
    ['stepup','soumu','koutsu'].forEach(k=>document.getElementById('t-'+k).classList.toggle('active',k===q));
  }
}

async function load(){
  loadAuth();
  const d=await api(`/api/nippou?department=${dept}&limit=60`);
  reports=(d&&d.items)||[];
  if(!selectedId&&reports.length) selectedId=reports[0].id;
  renderDateList();
  renderDetail();
}

initDeptFromUrl();
load();
</script>
<script src="/static/nav.js"></script>
</body>
</html>
