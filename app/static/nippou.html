<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ノウハウキング君 — 日報</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@500;600;700&display=swap');
  :root{ --ink:#0f172a; --sub:#64748b; --line:#e5e7eb; --accent:#1e3a8a; --accent2:#2f4fa0; }
  body{ font-family:'Noto Sans JP',sans-serif; background:#e8eaee; color:var(--ink); -webkit-font-smoothing:antialiased; }
  .serif{ font-family:'Noto Serif JP',serif; }
  .fade-in{ animation:fadeIn .35s cubic-bezier(.21,.61,.35,1); }
  @keyframes fadeIn{ from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
  .panel{ background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 1px 2px rgba(15,23,42,.05); }
  .report{ background:#fff;border:1px solid #e3e6ea;border-radius:8px;box-shadow:0 12px 44px rgba(15,23,42,.12),0 2px 8px rgba(15,23,42,.06); }
  .tab{ padding:7px 18px;font-size:.85rem;font-weight:600;border-radius:6px;cursor:pointer;transition:all .18s;background:#fff;color:#64748b;border:1px solid var(--line); }
  .tab.active{ background:var(--accent);color:#fff;border-color:transparent;box-shadow:0 3px 10px rgba(30,58,138,.3); }
  .tab:not(.active):hover{ background:#f8fafc;color:#334155; }
  .lbl{ font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#94a3b8; }
  /* 本文(markdown) — 文書体裁 */
  .md{ color:#334155;font-size:.92rem; }
  .md h1{ font-family:'Noto Serif JP',serif;font-size:1.2rem;font-weight:700;color:var(--ink);margin:1.2em 0 .5em; }
  .md h2{ font-family:'Noto Serif JP',serif;font-size:1.05rem;font-weight:700;color:var(--ink);margin:1.4em 0 .5em;padding-bottom:.3em;border-bottom:1px solid #e5e7eb; }
  .md h3{ font-weight:700;color:#1e293b;margin:1.1em 0 .4em;padding-left:.6em;border-left:3px solid var(--accent); }
  .md p{ margin:.55em 0;line-height:1.9; }
  .md ul{ list-style:none;padding-left:0;margin:.5em 0; }
  .md ul>li{ position:relative;padding-left:1.2em;margin:.42em 0;line-height:1.85; }
  .md ul>li::before{ content:"";position:absolute;left:.15em;top:.7em;width:5px;height:5px;border-radius:1px;background:var(--accent);transform:rotate(45deg); }
  .md ol{ list-style:decimal;padding-left:1.4em;margin:.5em 0; }
  .md ol>li{ margin:.42em 0;line-height:1.85; }
  .md table{ border-collapse:collapse;margin:.9em 0;font-size:.85rem;width:100%;border:1px solid #d8dde4; }
  .md th,.md td{ border:1px solid #e5e7eb;padding:8px 12px;text-align:left; }
  .md th{ background:#f1f5f9;font-weight:700;color:#334155; }
  .md code{ background:#f1f5f9;padding:1px 6px;border-radius:4px;font-size:.85em;color:#1e3a8a; }
  .md blockquote{ border-left:3px solid #cbd5e1;padding:.2em .9em;color:#64748b;margin:.6em 0; }
  /* ===== 強調（資料らしく抑制・要点だけ） ===== */
  .md strong{ color:var(--accent);font-weight:700; }
  .hl-yen{ color:#0f172a;font-weight:700; }
  .hl-num{ color:#0f172a;font-weight:700; }
  .hl-pct{ color:#0f172a;font-weight:700; }
  .hl-pct.good{ color:#047857; } .hl-pct.warn{ color:#b45309; } .hl-pct.bad{ color:#b91c1c; }
  .hl-up{ color:#047857;font-weight:700; }
  .hl-down{ color:#b91c1c;font-weight:700; }
  .hl-kw{ color:#1e293b;font-weight:700; }
  .hl-risk{ color:#b91c1c;font-weight:700; }
  .cite{ color:#aab2bd;font-size:.82em;font-weight:400; }
  ::-webkit-scrollbar{ width:8px;height:8px; }
  ::-webkit-scrollbar-thumb{ background:#cfd5dd;border-radius:8px; }
  @media print{
    body{ background:#fff; }
    .no-print{ display:none !important; }
    .report{ box-shadow:none;border:none;border-radius:0; }
    .lg\:w-3\/4{ width:100% !important; }
    @page{ margin:14mm; }
  }
</style>
</head>
<body class="min-h-screen">

<nav class="no-print bg-white/90 backdrop-blur border-b border-gray-200 sticky top-0 z-50">
  <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:var(--accent)">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      </div>
      <h1 class="text-lg font-bold text-gray-900">日報</h1>
      <span class="text-xs text-gray-400 hidden sm:inline">ノウハウキング君</span>
    </div>
    <div class="flex items-center gap-2">
      <span id="auth-box" class="hidden items-center gap-2 text-xs text-gray-500">
        <span id="auth-user"></span>
        <a href="/auth/logout" class="px-2 py-1 bg-gray-100 hover:bg-gray-200 rounded-lg">ログアウト</a>
      </span>
      <button onclick="window.print()" class="text-sm px-3 py-1.5 bg-gray-100 hover:bg-gray-200 rounded-lg transition">印刷 / PDF</button>
      <button onclick="load()" class="text-sm px-3 py-1.5 bg-gray-100 hover:bg-gray-200 rounded-lg transition">更新</button>
    </div>
  </div>
</nav>

<div class="max-w-6xl mx-auto px-4 py-7 space-y-5">

  <!-- 部署タブ -->
  <div class="no-print flex flex-wrap items-center gap-2.5">
    <span id="t-stepup" class="tab active" onclick="setDept('stepup')">ステップアップ</span>
    <span id="t-soumu" class="tab" onclick="setDept('soumu')">総務</span>
    <span id="t-koutsu" class="tab" onclick="setDept('koutsu')">交通誘導</span>
  </div>

  <div class="flex flex-col lg:flex-row gap-5">
    <!-- 左：日付リスト -->
    <div class="no-print lg:w-1/4">
      <div class="panel overflow-hidden">
        <div class="px-4 py-3 border-b border-gray-100">
          <h2 class="lbl">日付</h2>
        </div>
        <div id="date-list" class="max-h-[72vh] overflow-y-auto"></div>
      </div>
    </div>

    <!-- 右：レポート -->
    <div class="lg:w-3/4">
      <div id="detail" class="fade-in min-h-[300px]">
        <div class="report p-8"><p class="text-sm text-gray-400">読み込み中…</p></div>
      </div>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;
let dept = 'stepup';
let reports = [];
let selectedId = null;
const DEPT_NAME={stepup:'ステップアップ事業部',soumu:'総務部',koutsu:'交通誘導事業部'};

function esc(s){const d=document.createElement('div');d.textContent=s==null?'':s;return d.innerHTML;}
function renderMd(md){
  if(!md) return '';
  try { return marked.parse(md); } catch { return '<p>'+esc(md)+'</p>'; }
}

async function api(path){try{const r=await fetch(API+path);if(!r.ok)return null;return await r.json();}catch{return null;}}

// ===== 要点強調：テキストノードだけを走査 =====
const RISK_WORDS=['リスク','BAN','停止','凍結','未達','遅延','緊急','課題','問題','クレーム','失注','解約','離脱','炎上','不足'];
const KW_WORDS=['内定','成約','受注','契約','獲得','過去最高','新規'];
function hlRules(text){
  const toks=[]; const stash=s=>{toks.push(s);return ' '+(toks.length-1)+' ';};
  let t=esc(text);
  t=t.replace(/[¥￥][\d,]+(?:円)?|\d[\d,]*円/g,m=>stash(`<span class="hl-yen">${m}</span>`));
  t=t.replace(/達成率\s*(\d+(?:\.\d+)?)\s*%/g,(m,n)=>{const v=parseFloat(n);const c=v>=100?'good':v>=80?'warn':'bad';return '達成率'+stash(`<span class="hl-pct ${c}">${n}%</span>`);});
  t=t.replace(/(\d+(?:\.\d+)?)\s*%/g,(m,n)=>stash(`<span class="hl-pct">${n}%</span>`));
  t=t.replace(/[+＋]\s*[\d,]+/g,m=>stash(`<span class="hl-up">${m}</span>`));
  t=t.replace(/[▲△]\s*[\d,]+/g,m=>stash(`<span class="hl-down">${m}</span>`));
  t=t.replace(/\d[\d,]*\s*(?:件|名|人|通|社|回|本|個|枚|台)/g,m=>stash(`<span class="hl-num">${m}</span>`));
  RISK_WORDS.forEach(w=>{t=t.split(w).join(stash(`<span class="hl-risk">${w}</span>`));});
  KW_WORDS.forEach(w=>{t=t.split(w).join(stash(`<span class="hl-kw">${w}</span>`));});
  return t.replace(/ (\d+) /g,(m,i)=>toks[+i]);
}
function highlight(root){
  if(!root) return;
  try{
    const walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{
      acceptNode:n=>(n.parentNode&&['CODE','PRE','SCRIPT','STYLE'].includes(n.parentNode.nodeName))?NodeFilter.FILTER_REJECT:NodeFilter.FILTER_ACCEPT
    });
    const targets=[]; let n; while(n=walker.nextNode()){ if(n.nodeValue&&n.nodeValue.trim()) targets.push(n); }
    targets.forEach(node=>{
      const html=hlRules(node.nodeValue);
      if(html!==esc(node.nodeValue)){ const span=document.createElement('span'); span.innerHTML=html; node.parentNode.replaceChild(span,node); }
    });
    root.querySelectorAll('*').forEach(el=>{
      el.childNodes.forEach(c=>{ if(c.nodeType===3&&/【(根拠|#)[^】]*】/.test(c.nodeValue)){
        const s=document.createElement('span'); s.innerHTML=esc(c.nodeValue).replace(/(【(?:根拠|#)[^】]*】)/g,'<span class="cite">$1</span>'); el.replaceChild(s,c);
      }});
    });
  }catch(e){/* degrade-safe */}
}

function setDept(d){
  dept=d;
  ['stepup','soumu','koutsu'].forEach(k=>document.getElementById('t-'+k).classList.toggle('active',k===d));
  selectedId=null;
  load();
}

async function loadAuth(){
  const d=await api('/auth/me');
  if(d&&d.oauth_enabled&&d.user){
    document.getElementById('auth-user').textContent=d.user;
    document.getElementById('auth-box').classList.remove('hidden');
    document.getElementById('auth-box').classList.add('flex');
  }
}

function renderDateList(){
  const box=document.getElementById('date-list');
  if(!reports.length){box.innerHTML='<p class="p-4 text-xs text-gray-400">日報がありません</p>';return;}
  box.innerHTML=reports.map(r=>{
    const active=r.id===selectedId;
    return `<button onclick="selectReport(${r.id})" class="w-full text-left px-4 py-3 border-l-[3px] transition ${active?'border-[var(--accent)] bg-slate-50':'border-transparent hover:bg-slate-50'}">
      <div class="text-sm font-bold ${active?'text-[var(--accent)]':'text-slate-700'}">${esc(r.report_date)}</div>
      <div class="text-xs text-slate-400 truncate mt-0.5">${esc(r.title||'(無題)')}</div>
    </button>`;
  }).join('');
}

const METRIC_LABELS={
  sales_month:'月間売上', target_month:'月間目標', achv_pct:'達成率',
  naitei_today:'本日の内定', naitei_month:'今月の内定', week_total:'先週の合計売上',
  week_pct:'先週時点の進捗', funnel:'採用ファネル', sales_today:'本日の売上'
};
const FUNNEL_ORDER=['登録','面談','紹介','面接','内定'];
function fmtYen(n){ return '¥'+Number(n).toLocaleString('ja-JP'); }

// 章見出し（番号＋和文＋英字）
function sec(num,jp,en){
  return `<div class="flex items-baseline gap-3 mt-9 mb-4 pb-2 border-b-2 border-slate-800">
    <span class="text-xs font-bold tracking-[0.18em]" style="color:var(--accent)">${num}</span>
    <h3 class="serif text-base font-bold text-slate-900">${jp}</h3>
    <span class="ml-auto text-[10px] font-semibold tracking-[0.18em] text-slate-400 uppercase hidden sm:inline">${en}</span>
  </div>`;
}

// 業績指標（達成率バー＋指標ボックス）
function kpiBlock(m){
  if(!m||typeof m!=='object') return '';
  const pct=('achv_pct' in m)?(Number(m.achv_pct)||0):null;
  const skip=new Set(['funnel','achv_pct']);
  const stats=Object.entries(m).filter(([k])=>!skip.has(k));
  if(pct===null && !stats.length) return '';
  let html='';
  if(pct!==null){
    const w=Math.max(0,Math.min(100,pct));
    const tone=pct>=100?'#047857':pct>=80?'#b45309':'#b91c1c';
    html+=`<div class="mb-5">
      <div class="flex items-end justify-between mb-2">
        <span class="text-sm font-semibold text-slate-600">月間達成率</span>
        <span class="serif text-2xl font-bold" style="color:${tone}">${pct}<span class="text-lg">%</span></span>
      </div>
      <div class="h-2 w-full bg-slate-100 rounded-sm overflow-hidden border border-slate-200">
        <div class="h-full" style="width:${w}%;background:${tone}"></div>
      </div>
    </div>`;
  }
  if(stats.length){
    const cells=stats.map(([k,v])=>{
      const label=METRIC_LABELS[k]||k;
      let val=v;
      if(v&&typeof v==='object') val=Object.entries(v).map(([a,b])=>`${a} ${b}`).join(' / ');
      else if(typeof v==='number'&&/(sales|total|target|amount|kingaku)/.test(k)) val=fmtYen(v);
      else if(typeof v==='number'&&/(pct|rate|ritsu)/.test(k)) val=v+'%';
      return `<div class="flex-1 min-w-[140px] border-r border-b border-slate-200 px-4 py-3.5">
        <div class="text-[11px] font-medium text-slate-500">${esc(label)}</div>
        <div class="serif text-lg font-bold text-slate-900 mt-1 break-all">${esc(String(val))}</div>
      </div>`;
    }).join('');
    html+=`<div class="flex flex-wrap border-t border-l border-slate-200 rounded-md overflow-hidden">${cells}</div>`;
  }
  return html;
}

// 採用ファネル（棒グラフ・落ち着いた配色）
function funnelView(f){
  if(!f||typeof f!=='object'||!Object.keys(f).length) return '';
  const keys=FUNNEL_ORDER.filter(k=>k in f).concat(Object.keys(f).filter(k=>!FUNNEL_ORDER.includes(k)));
  const vals=keys.map(k=>Number(f[k])||0);
  const max=Math.max(1,...vals);
  const cols=keys.map((k,i)=>{
    const v=vals[i]; const h=Math.max(5,Math.round(v/max*64));
    const goal=(k==='内定');
    const bg=goal?'var(--accent)':'#94a3b8';
    return `<div class="flex-1 min-w-0 flex flex-col items-center">
      <div class="serif text-lg font-bold ${goal?'text-[var(--accent)]':'text-slate-700'} mb-1.5">${v}</div>
      <div class="h-16 w-full flex items-end justify-center">
        <div class="w-8 sm:w-11 rounded-t-sm" style="height:${h}px;background:${bg}"></div>
      </div>
      <div class="text-[11px] font-medium text-slate-500 mt-2 pt-2 border-t border-slate-200 w-full text-center truncate">${esc(k)}</div>
    </div>`;
  }).join('');
  return `<div class="flex items-end gap-2 sm:gap-4 px-1">${cols}</div>`;
}

function renderDetail(){
  const box=document.getElementById('detail');
  const r=reports.find(x=>x.id===selectedId);
  if(!r){box.innerHTML='<div class="report p-8"><p class="text-sm text-gray-400">日報を選んでください</p></div>';return;}
  const m=r.metrics||{};
  const hasKpi=(m&&typeof m==='object'&&(('achv_pct' in m)||Object.keys(m).some(k=>k!=='funnel')));
  let n=0; const num=()=>String(++n).padStart(2,'0');
  box.innerHTML=`
   <div class="report p-7 sm:p-10">
    <!-- 表題 -->
    <div class="h-1.5 -mx-7 sm:-mx-10 -mt-7 sm:-mt-10 mb-7 rounded-t-[7px]" style="background:linear-gradient(90deg,var(--accent),var(--accent2))"></div>
    <div class="flex items-center justify-between mb-4">
      <div class="text-[11px] font-bold tracking-[0.22em] text-slate-500 uppercase">髙木産業グループ</div>
      <div class="text-[10px] font-bold tracking-[0.22em] text-white px-2.5 py-1 rounded-sm" style="background:var(--accent)">DAILY REPORT</div>
    </div>
    <h2 class="serif text-2xl sm:text-[1.9rem] font-bold text-slate-900 leading-snug">${esc(r.title||'(無題)')}</h2>
    <div class="flex flex-wrap items-center gap-x-4 gap-y-1 mt-3 text-sm text-slate-500">
      <span>${esc(DEPT_NAME[r.department]||DEPT_NAME[dept]||'')}</span>
      <span class="text-slate-300">|</span>
      <span>${esc(r.report_date)}</span>
      ${r.bucho?`<span class="text-slate-300">|</span><span class="font-semibold text-slate-700">${esc(r.bucho)}</span>`:''}
    </div>

    ${r.summary?`${sec(num(),'エグゼクティブサマリー','Executive Summary')}
      <div class="pl-4 border-l-2 border-slate-300 text-[15px] leading-[2] text-slate-700 whitespace-pre-line" data-hl>${esc(r.summary)}</div>`:''}

    ${hasKpi?`${sec(num(),'業績指標','Key Metrics')}${kpiBlock(m)}`:''}

    ${(m.funnel)?`${sec(num(),'採用ファネル','Recruitment Funnel')}${funnelView(m.funnel)}`:''}

    ${r.bucho_comment?`${sec(num(),'部長所見',"Director's Note")}
      <blockquote class="border-l-2 border-slate-800 pl-5 text-[15px] leading-[2] text-slate-700" data-hl>${esc(r.bucho_comment)}</blockquote>
      ${r.bucho?`<div class="text-right text-sm text-slate-500 mt-2.5">— ${esc(r.bucho)}</div>`:''}`:''}

    ${r.body_md?`${sec(num(),'活動詳細','Details')}<div class="md" data-hl>${renderMd(r.body_md)}</div>`:''}

    <!-- フッター -->
    <div class="mt-10 pt-4 border-t border-slate-200 flex flex-wrap justify-between gap-2 text-[11px] text-slate-400">
      <span>ノウハウキング君 — 自動生成レポート</span>
      <span>${esc(r.report_date)}</span>
    </div>
   </div>
  `;
  box.querySelectorAll('[data-hl]').forEach(highlight);
}

function selectReport(id){selectedId=id;renderDateList();renderDetail();window.scrollTo({top:0,behavior:'smooth'});}

let wantId=null;  // ?id= で索引ページから来たときに開く日報
function initDeptFromUrl(){
  const sp=new URLSearchParams(window.location.search);
  const q=sp.get('dept');
  if(q && ['stepup','soumu','koutsu'].includes(q)){
    dept=q;
    ['stepup','soumu','koutsu'].forEach(k=>document.getElementById('t-'+k).classList.toggle('active',k===q));
  }
  const idp=parseInt(sp.get('id'),10);
  if(Number.isFinite(idp)) wantId=idp;
}

async function load(){
  loadAuth();
  const d=await api(`/api/nippou?department=${dept}&limit=60`);
  reports=(d&&d.items)||[];
  if(wantId && reports.some(r=>r.id===wantId)){ selectedId=wantId; wantId=null; }
  if(!selectedId&&reports.length) selectedId=reports[0].id;
  renderDateList();
  renderDetail();
}

initDeptFromUrl();
load();
</script>
<script src="/static/nav.js"></script>
</body>
</html>
