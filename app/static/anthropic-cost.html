<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ノウハウキング君 — Anthropic費用ダッシュボード</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  body { font-family: 'Inter', sans-serif; }
  .fade-in { animation: fadeIn 0.3s ease-in; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

<nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
  <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-amber-600 rounded-lg flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      </div>
      <h1 class="text-lg font-bold text-gray-900">Anthropic費用ダッシュボード</h1>
      <span class="text-xs text-gray-400 hidden sm:inline">ノウハウキング君</span>
    </div>
    <div class="flex items-center gap-2">
      <a href="/token-cutter" class="text-sm px-3 py-1.5 bg-gray-100 hover:bg-gray-200 rounded-lg transition">トークンカッター</a>
      <a href="/growth" class="text-sm px-3 py-1.5 bg-gray-100 hover:bg-gray-200 rounded-lg transition">成長</a>
      <a href="/" class="text-sm px-3 py-1.5 bg-gray-100 hover:bg-gray-200 rounded-lg transition">一覧</a>
    </div>
  </div>
</nav>

<div class="max-w-5xl mx-auto px-4 py-6 space-y-6">
  <div class="bg-amber-50 border border-amber-100 rounded-xl px-5 py-3 text-amber-900 text-sm">
    Gmailに届くAnthropicの領収書（APIクレジット購入・Claude追加利用チャージ）を毎朝自動取込し、実際に支払った金額をUSD+日本円で可視化します。円換算は各領収書の取込時点レート。
  </div>

  <div id="cards" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
      <h2 class="font-semibold text-sm text-gray-700 mb-1">今月の日別支払い</h2>
      <p class="text-xs text-gray-400 mb-3">領収書ベース（円）</p>
      <div style="position:relative;height:240px;"><canvas id="daily" role="img" aria-label="今月の日別支払い"></canvas></div>
    </div>
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
      <h2 class="font-semibold text-sm text-gray-700 mb-1">月次推移（種別内訳）</h2>
      <p class="text-xs text-gray-400 mb-3">USD・積み上げ</p>
      <div style="position:relative;height:240px;"><canvas id="monthly" role="img" aria-label="月次推移"></canvas></div>
    </div>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
    <h2 class="font-semibold text-sm text-gray-700 mb-3">最近の領収書</h2>
    <div id="recent" class="divide-y divide-gray-50 text-sm"></div>
  </div>
</div>

<footer class="mt-12 py-4 text-center text-xs text-gray-400 border-t border-gray-100">ノウハウキング君 — Anthropic費用ダッシュボード（毎朝自動更新）</footer>

<script>
const API = window.location.origin;
function esc(s){const d=document.createElement('div');d.textContent=s==null?'':s;return d.innerHTML;}
function jpy(n){return '¥'+Number(n||0).toLocaleString('ja-JP');}
function usd(n){return '$'+Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
async function api(p){try{const r=await fetch(API+p);if(!r.ok)return null;return await r.json();}catch{return null;}}

const KIND_JA={api_credit:'APIクレジット',extra_usage:'Claude追加利用',subscription:'プラン月額',other:'その他'};
const KIND_COLOR={api_credit:'#4f46e5',extra_usage:'#d97706',subscription:'#059669',other:'#9ca3af'};

function card(label,value,sub){
  return `<div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 fade-in">
    <div class="text-xs text-gray-500">${esc(label)}</div>
    <div class="text-2xl font-bold text-gray-900 mt-0.5">${value}</div>
    <div class="text-xs text-gray-400 mt-0.5">${sub||''}</div></div>`;
}

let dailyChart, monthlyChart;

function renderDaily(d){
  const labels=d.daily.map(p=>p.date.slice(8));
  if(dailyChart)dailyChart.destroy();
  dailyChart=new Chart(document.getElementById('daily'),{
    type:'bar',
    data:{labels,datasets:[{label:'支払い(円)',data:d.daily.map(p=>p.total_jpy),backgroundColor:'#d97706',borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>jpy(c.raw)}}},
      scales:{y:{ticks:{callback:v=>'¥'+(v>=1e4?(v/1e4)+'万':v.toLocaleString())}}}}
  });
}

function renderMonthly(d){
  const labels=d.monthly.map(m=>m.month);
  const kinds=Object.keys(KIND_JA);
  if(monthlyChart)monthlyChart.destroy();
  monthlyChart=new Chart(document.getElementById('monthly'),{
    type:'bar',
    data:{labels,datasets:kinds.map(k=>({label:KIND_JA[k],data:d.monthly.map(m=>(m.by_kind&&m.by_kind[k])||0),backgroundColor:KIND_COLOR[k],stack:'usd',borderRadius:3}))},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:10}}},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${usd(c.raw)}`}}},
      scales:{x:{stacked:true},y:{stacked:true,ticks:{callback:v=>'$'+v.toLocaleString()}}}}
  });
}

function renderRecent(d){
  const el=document.getElementById('recent');
  if(!d.recent.length){el.innerHTML='<p class="text-xs text-gray-400">データなし</p>';return;}
  el.innerHTML=d.recent.map(r=>`
    <div class="py-2.5 flex items-center gap-3">
      <span class="text-xs text-gray-400 w-20">${esc(r.receipt_date)}</span>
      <span class="text-xs px-2 py-0.5 rounded-full" style="background:${KIND_COLOR[r.kind]||'#9ca3af'}1a;color:${KIND_COLOR[r.kind]||'#6b7280'}">${esc(KIND_JA[r.kind]||r.kind)}</span>
      <span class="flex-1 text-gray-600 truncate text-xs" title="${esc(r.description)}">${esc(r.description)}</span>
      <span class="font-semibold text-gray-800 w-24 text-right">${usd(r.total_usd)}</span>
      <span class="text-gray-500 w-24 text-right text-xs">${r.total_jpy!=null?jpy(r.total_jpy):'-'}</span>
    </div>`).join('');
}

async function load(){
  const d=await api('/api/anthropic-cost/stats?months=6');
  if(!d){document.getElementById('cards').innerHTML='<p class="text-sm text-gray-400 col-span-4">データ取得に失敗しました（ログインが必要な場合があります）</p>';return;}
  const c=d.current;
  const prev=d.monthly.length>=2?d.monthly[d.monthly.length-2]:null;
  document.getElementById('cards').innerHTML=
    card('今月の支払い合計',esc(c.total_jpy_human),usd(c.total_usd)+`（${c.days_elapsed}/${c.days_in_month}日経過）`)+
    card('月末ペース予測',esc(c.projection_jpy_human),usd(c.projection_usd)+' 想定')+
    card('先月の支払い',prev?esc(jpy(prev.total_jpy)):'-',prev?usd(prev.total_usd):'')+
    card('適用レート',d.usdjpy_latest?('$1 = ¥'+Number(d.usdjpy_latest).toFixed(2)):'-','直近領収書の取込時点');
  renderDaily(d);renderMonthly(d);renderRecent(d);
}
load();
</script>
<script src="/static/nav.js"></script>
</body>
</html>
